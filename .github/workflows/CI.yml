name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Matches kotidy's own jvmToolchain(17) (build.gradle.kts) -- unlike
          # next-caltrain-kotlin's CI.yml, which pins 21 to match that repo's
          # own gradle-daemon-jvm.properties.
          java-version: "17"

      - name: Run checks
        # clean check, not make check -- CI should fail loudly on a style
        # violation, not silently auto-fix it via ktlintFormat and pass
        # anyway (make check runs ktlintFormat first for local dev
        # convenience; that's wrong here since a CI-side fix never gets
        # committed back). check already runs ktlintCheck + test together.
        run: ./gradlew clean check
